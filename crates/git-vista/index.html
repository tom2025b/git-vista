<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover so the graph reaches under the iPad's rounded corners /
         home indicator; user-scalable=no so a stray pinch zooms the graph (our own
         camera) rather than the whole page. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>git-vista</title>
    <meta name="description" content="A browser-first, zoomable vertical git history visualizer." />

         so there's no separate asset for Trunk to copy. Matches the app's palette. -->
